name: Still
options:
  bundleIdPrefix: com.allinoneapp
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0.0"
    TARGETED_DEVICE_FAMILY: "1"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES

targets:
  Still:
    type: application
    platform: iOS
    sources:
      - path: Still
      - path: Core
    resources:
      - path: Still/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.allinoneapp.still
        INFOPLIST_FILE: Still/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        OTHER_LDFLAGS: "$(inherited) -weak_framework AlarmKit"
        # Let Automatic signing pick Development vs Distribution (hard-coding "iPhone Developer" breaks App Store export in Xcode Cloud).
        CODE_SIGN_IDENTITY: ""
    entitlements:
      path: Still/Still.entitlements
    dependencies:
      - target: StillMonitor
        embed: true
      - target: StillShield
        embed: true
    scheme:
      testTargets: []

  StillMonitor:
    type: app-extension
    platform: iOS
    sources:
      - path: DeviceActivityMonitor
      - path: Core
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.allinoneapp.still.monitor
        INFOPLIST_FILE: DeviceActivityMonitor/Info.plist
        CODE_SIGN_IDENTITY: ""
    entitlements:
      path: DeviceActivityMonitor/StillMonitor.entitlements

  StillShield:
    type: app-extension
    platform: iOS
    sources:
      - path: ShieldConfiguration
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.allinoneapp.still.shield
        INFOPLIST_FILE: ShieldConfiguration/Info.plist
        CODE_SIGN_IDENTITY: ""
    entitlements:
      path: ShieldConfiguration/StillShield.entitlements

schemes:
  Still:
    build:
      targets:
        Still: all
